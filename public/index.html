<!DOCTYPE html>
<html lang="en">
<head>
    <title>StreamZone - Live Sports & Broadcasts</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        nav { position: sticky; top: 0; z-index: 100; height: 64px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .nav-brand { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.03em; }
        .nav-brand span { color: #e63946; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .stream-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .stream-card { position: relative; border-radius: 8px; overflow: hidden; background: #141414; text-decoration: none; color: inherit; transition: transform 0.2s; display: flex; flex-direction: column; }
        .stream-card:hover { transform: translateY(-4px); }
        .card-thumb { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #222; display: flex; align-items: center; justify-content: center; }
        .card-body { padding: 16px; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 12px; color: #888; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: #e63946; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
        .ad-banner { width: 100%; height: 90px; border: 2px dashed #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-top: 40px; background: #141414; }
    </style>
</head>
<body>
    <nav><div class="nav-brand">Stream<span>Zone</span></div></nav>
    <div class="container">
        <h2>Live Channels</h2>
        <div style="margin: 20px 0;"></div>
        <div id="streamGrid" class="stream-grid">
            <a class="stream-card" href="/viewer.html?stream=stream">
                <div class="card-thumb"><div class="live-badge">Live</div></div>
                <div class="card-body"><div class="card-title">My Stream</div><div class="card-desc">OBS Broadcast</div></div>
            </a>
            <a class="stream-card" href="/viewer.html?stream=beinxtra&type=hls&src=https://amg01334-beinsportsllc-beinxtra-samsungau-eiyvc.amagi.tv/playlist/amg01334-beinsportsllc-beinxtra-samsungau/playlist.m3u8">
                <div class="card-thumb" style="background: #0d4d2e;"></div>
                <div class="card-body"><div class="card-title">beIN SPORTS Xtra</div><div class="card-desc">Live Sports</div></div>
            </a>
        </div>
        <div class="ad-banner">Advertisement</div>
    </div>
</body>
</html>
