<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Stream - Viewer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        nav { height: 64px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .nav-brand { font-size: 20px; font-weight: 800; text-transform: uppercase; text-decoration: none; color: #fff; }
        .nav-brand span { color: #e63946; }
        .main-content { max-width: 960px; margin: 40px auto; width: 100%; padding: 0 20px; }
        #videoContainer { width: 100%; background: #000; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 16 / 9; }
        video { width: 100%; height: 100%; display: block; }
        #unmuteOverlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); cursor: pointer; color: #fff; font-size: 14px; font-weight: 600; }
        .ad-banner { width: 100%; height: 90px; border: 2px dashed #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 12px; text-transform: uppercase; margin-top: 24px; background: #141414; }
    </style>
</head>
<body>
    <nav><a class="nav-brand" href="/">Stream<span>Zone</span></a><div id="viewerCount">0 viewers</div></nav>
    <main class="main-content">
        <div id="videoContainer">
            <div id="unmuteOverlay"><span>Click to unmute</span></div>
            <video id="videoPlayer" controls autoplay muted></video>
        </div>
        <div class="ad-banner">Advertisement</div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const streamName = params.get('stream') || 'stream';
        const streamType = params.get('type') || 'flv';
        const hlsSrc = params.get('src') || '';
        const videoElement = document.getElementById('videoPlayer');
        const unmuteOverlay = document.getElementById('unmuteOverlay');
        const socket = io();
        socket.on('viewer-count', (count) => document.getElementById('viewerCount').textContent = `${count} viewers`);
        unmuteOverlay.addEventListener('click', () => { videoElement.muted = false; unmuteOverlay.style.display = 'none'; });

        if (streamType === 'hls' && hlsSrc) {
            if (Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(hlsSrc); hls.attachMedia(videoElement);
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = hlsSrc;
            }
        } else if (flvjs.isSupported()) {
            const flvPlayer = flvjs.createPlayer({ type: 'flv', url: `${window.location.origin}/live/${streamName}.flv` });
            flvPlayer.attachMediaElement(videoElement); flvPlayer.load(); flvPlayer.play();
        }
    </script>
</body>
</html>
