version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: streamx-server
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    volumes:
      - transcoding-tmp:/tmp/streamx-transcode
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - REACT_APP_PROXY_URL=http://localhost:4000
        - REACT_APP_STREAM_TITLE=DeportesPlus Live
        - REACT_APP_PLATFORM_NAME=StreamX
    container_name: streamx-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  transcoding-tmp:
